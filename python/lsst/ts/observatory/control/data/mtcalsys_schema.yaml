$schema: http://json-schema.org/draft-07/schema#
$id: https://github.com/lsst-ts/ts_observatory_control/blob/develop/python/lsst/ts/observatory/control/data/mtcalsys_schema.yaml
title: Configuration file validation schema of Main Telescope Calibration System
type: object
properties:
  calib_type:
    type: string
    enum:
      - Mono
      - WhiteLight
  use_camera:
    type: boolean
  mtcamera_filter:
    type: string
  led_name:
    type: array
    items:
      type: string
      enum:
        - M385L3
        - M455L4
        - M505L4
        - M565L3
        - M660L4
        - M730L5
        - M780LP1
        - M850L3
        - M940L3
        - M970L4
  wavelength:
    type: number
  wavelength_width:
    type: number
  wavelength_resolution:
    type: number
  led_location:
    type: number
  led_focus:
    type: number
  use_electrometer:
    type: boolean
  use_fiberspectrograph_red:
    type: boolean
  use_fiberspectrograph_blue:
    type: boolean
  electrometer_integration_time:
    type: number
  electrometer_mode:
    type: string
    enum:
      - CURRENT
      - CHARGE
      - VOLTAGE
      - RESISTANCE
  electrometer_range:
    type: number
  exposure_times:
    type: array
    items:
      type: number
  laser_mode:
    type: boolean
  optical_configuration: 
    type: string
    enum: 
      - SCU
      - NO_SCU
      - F1_SCU
      - F2_SCU
      - F2_NO_SCU
      - F1_NO_SCU
required:
- calib_type
- wavelength
- use_camera
- use_electrometer
- use_fiberspectrograph_red
- use_fiberspectrograph_blue
- exposure_times
additionalProperties: false
